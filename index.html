<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VéloParis</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚲</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>🚲 VéloParis</h1>
      <p class="subtitle">Sorties vélo depuis les gares parisiennes</p>
    </div>

    <div id="gare-picker">
      <p class="label">Gare de départ</p>
      <div id="gare-list"></div>
    </div>

    <div id="controls" class="hidden">
      <button id="back-btn">← Retour</button>
      <h2 id="gare-name"></h2>

      <div class="filter-row">
        <select id="line-filter">
          <option value="all">Toutes les lignes</option>
        </select>
      </div>

      <div id="legend"></div>

      <div id="station-count" class="station-count"></div>
    </div>
  </div>

  <div id="map"></div>

  <script src="data.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
